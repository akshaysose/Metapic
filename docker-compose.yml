version: "3.8"
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes:
      - mongo-data:/data/db

  face-service:
    build: ./face-service
    restart: unless-stopped
    ports: ["8000:8000"]
    environment:
      - PYTHONUNBUFFERED=1

  backend:
    build: ./backend
    restart: unless-stopped
    ports: ["4000:4000"]
    depends_on:
      - mongo
      - face-service
    environment:
      - MONGO_URI=mongodb://mongo:27017/kwikpic
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - FACE_SERVICE_URL=http://face-service:8000
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FRONTEND_URL=http://localhost:5173

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo-data:
